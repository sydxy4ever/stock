version: '3.8'

services:
  stock-fetch-daily:
    image: stock-fetch-daily:latest
    container_name: stock-fetch-daily
    environment:
      - LIXINGER_TOKEN=${LIXINGER_TOKEN}
      - DB_PATH=/data/stock_data.db
      - TURNOVER_DB_PATH=/data/turnover_surge.db
      - TZ=Asia/Shanghai
    volumes:
      # 将当前目录下的数据文件挂载到容器中
      # 如果你希望在 Portainer 中管理，确保路径正确
      - /data/stock:/data
    # 调度器需要常驻后台运行
    restart: unless-stopped

  stock-dashboard:
    image: stock-fetch-daily:latest
    container_name: stock-dashboard
    environment:
      - LIXINGER_TOKEN=${LIXINGER_TOKEN}
      - DB_PATH=/data/stock_data.db
      - TURNOVER_DB_PATH=/data/turnover_surge.db
      - TZ=Asia/Shanghai
    ports:
      - "8501:8501"
    volumes:
      - /data/stock:/data
    command: ["python", "-m", "streamlit", "run", "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped
